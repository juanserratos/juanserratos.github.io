<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan Serratos</title>

  <link rel="icon" type="image/svg+xml" href="../favicon.svg">

  <style>
    :root {
      --bg-color: #1a1a1a;
      --text-color: #f0f0f0;
      --link-color: #88bbff;
      --heading-color: #ffffff;
      --border-color: #333333;
      --sidebar-bg: #222222;
      --sidebar-text: #cccccc;
      --sidebar-link: #d4944c;
      --sidebar-header-color: #f0f0f0;
      --hero-name-color: #d4944c;
      --hero-subtitle-color: #aaaaaa;
      --hero-quote-color: #bbbbbb;
      --ant-white: #1a1a1a;
      --ant-black: #e0e0e0;
      --ant-accent-1: #88bbff;
      --ant-accent-2: #ff9999;
      --ant-accent-3: #66d9d4;
      --ant-trail-opacity: 0.08;
      --muted: #888888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.6; font-size: 13px;
      background-color: var(--bg-color); color: var(--text-color);
    }

    a { color: var(--link-color); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-layout { display: flex; height: 100vh; width: 100vw; }

    .hero-panel { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: flex-start; overflow: hidden; }
    .hero-content { position: relative; z-index: 2; padding: 80px 60px 40px 60px; max-width: 700px; }
    .hero-content h1 { font-size: 3em; font-weight: 600; color: var(--hero-name-color); margin-bottom: 4px; letter-spacing: -0.5px; }
    .hero-content .subtitle { font-size: 1.6em; font-weight: 300; color: var(--hero-subtitle-color); margin-bottom: 0; }
    .hero-quote { position: relative; z-index: 2; padding: 0 60px; margin-top: 120px; max-width: 600px; }
    .hero-quote blockquote { font-size: 1.1em; font-style: normal; color: var(--hero-quote-color); line-height: 1.7; border: none; padding: 0; margin: 0; }
    .hero-quote blockquote p { margin-bottom: 8px; }
    .hero-quote cite { display: block; font-size: 0.95em; color: var(--hero-quote-color); font-style: italic; opacity: 0.8; }

    .sidebar { width: 220px; min-width: 220px; height: 100vh; background-color: var(--sidebar-bg); border-left: 1px solid var(--border-color); padding: 30px 25px; display: flex; flex-direction: column; position: relative; z-index: 3; overflow-y: auto; }
    .sidebar-lang { font-size: 0.9em; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); color: var(--muted); }
    .sidebar-lang a { color: var(--muted); }
    .sidebar-lang a:hover { color: var(--sidebar-link); }
    .sidebar-lang a.active { color: var(--heading-color); font-weight: 600; }
    .sidebar-header { font-size: 1.15em; font-weight: 700; color: var(--sidebar-header-color); margin-bottom: 24px; }
    .sidebar nav ul { list-style: none; padding: 0; margin: 0; }
    .sidebar nav ul li { margin-bottom: 16px; }
    .sidebar nav ul li a { color: var(--sidebar-link); font-size: 1.05em; text-decoration: none; }
    .sidebar nav ul li a:hover { text-decoration: underline; opacity: 0.8; }
    .sidebar-footer { margin-top: auto; padding-top: 20px; font-size: 0.85em; color: var(--sidebar-text); opacity: 0.6; line-height: 1.5; }

    #antContainer { position: fixed; top: 0; left: 0; width: calc(100vw - 220px); height: 100vh; pointer-events: none; overflow: hidden; z-index: 0; }
    #antCanvas { width: 100%; height: 100%; display: block; border: none; background-color: var(--bg-color); opacity: 0; animation: fadeIn 2s ease-out forwards; }
    @keyframes fadeIn { to { opacity: 1; } }

    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .page-layout { flex-direction: column; height: auto; min-height: 100vh; }
      .hero-panel { min-height: 70vh; }
      .hero-content { padding: 50px 30px 20px 30px; }
      .hero-content h1 { font-size: 2.2em; }
      .hero-content .subtitle { font-size: 1.2em; }
      .hero-quote { padding: 0 30px; margin-top: 60px; }
      .sidebar { width: 100%; min-width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border-color); }
      #antContainer { width: 100vw; }
    }
  </style>
</head>
<body>
  <div class="page-layout">
    <div class="hero-panel">
      <div class="hero-content">
        <h1>Juan Serratos</h1>
        <p class="subtitle">Matem&aacute;ticas, Universidad de Pensilvania</p>
      </div>
      <div class="hero-quote">
        <blockquote>
          <p>&laquo; El cielo, al atardecer, parec&iacute;a una flor carn&iacute;vora. &raquo;</p>
          <cite>&ndash; Roberto Bola&ntilde;o, <em>2666</em></cite>
        </blockquote>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-lang">
        <a href="../index.html">EN</a> |
        <a href="../fr/index.html">FR</a> |
        <a href="index.html" class="active">ES</a>
      </div>
      <div class="sidebar-header">Juan Serratos</div>
      <nav>
        <ul>
          <li><a href="cv.html">CV</a></li>
          <li><a href="publications.html">Publicaciones</a></li>
          <li><a href="courses.html">Cursos</a></li>
          <li><a href="activities.html">Actividades</a></li>
          <li><a href="../blog/index.html">Escritos</a></li>
          <li><a href="../projects/projects/portfolio-optimization.html">Proyectos</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer"><p>serratos@upenn.edu</p></div>
    </aside>
  </div>

  <div id="antContainer"><canvas id="antCanvas"></canvas></div>

  <script>
    const canvas = document.getElementById('antCanvas');
    const ctx = canvas.getContext('2d');
    const sidebarWidth = 220;
    function resizeCanvas() { canvas.width = window.innerWidth - sidebarWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    const cellSize = 2;
    let cols = Math.floor(canvas.width / cellSize);
    let rows = Math.floor(canvas.height / cellSize);
    let grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => ({ state: 0, age: 0, visits: 0 })));
    const trailCanvas = document.createElement('canvas');
    const trailCtx = trailCanvas.getContext('2d');
    trailCanvas.width = canvas.width; trailCanvas.height = canvas.height;
    let colors = { white:'#1a1a1a', black:'#e0e0e0', accent1:'#88bbff', accent2:'#ff9999', accent3:'#66d9d4', trailOpacity:0.08 };
    function updateColors() {
      const s = getComputedStyle(document.documentElement);
      colors.white = s.getPropertyValue('--bg-color').trim()||'#1a1a1a';
      colors.black = s.getPropertyValue('--ant-black').trim()||'#e0e0e0';
      colors.accent1 = s.getPropertyValue('--ant-accent-1').trim()||'#88bbff';
      colors.accent2 = s.getPropertyValue('--ant-accent-2').trim()||'#ff9999';
      colors.accent3 = s.getPropertyValue('--ant-accent-3').trim()||'#66d9d4';
      colors.trailOpacity = parseFloat(s.getPropertyValue('--ant-trail-opacity').trim())||0.08;
    }
    function getTextAreas() {
      const h = document.querySelector('.hero-content'), q = document.querySelector('.hero-quote');
      const r1 = h.getBoundingClientRect(), r2 = q.getBoundingClientRect(), p = 50;
      return [
        {left:r1.left-p,right:r1.right+p,top:r1.top-p,bottom:r1.bottom+p},
        {left:r2.left-p,right:r2.right+p,top:r2.top-p,bottom:r2.bottom+p}
      ];
    }
    function isTooCloseToText(x,y) {
      const a=getTextAreas(), px=x*cellSize, py=y*cellSize;
      return a.some(t=>px>=t.left&&px<=t.right&&py>=t.top&&py<=t.bottom);
    }
    function generateSpawnPosition(zone) {
      let x,y,att=0;
      do {
        switch(zone) {
          case 'center-scattered': { const a=Math.random()*Math.PI*2, r=Math.random()*Math.min(cols,rows)*0.3; x=Math.floor(cols/2+Math.cos(a)*r); y=Math.floor(rows/2+Math.sin(a)*r); break; }
          case 'mid-zones': if(Math.random()<0.5){x=Math.floor(cols*(0.2+Math.random()*0.6));y=Math.random()<0.5?Math.floor(rows*0.2):Math.floor(rows*0.8)}else{x=Math.random()<0.5?Math.floor(cols*0.2):Math.floor(cols*0.8);y=Math.floor(rows*(0.2+Math.random()*0.6))} break;
          case 'random-all': x=Math.floor(Math.random()*cols);y=Math.floor(Math.random()*rows); break;
          case 'edges': if(Math.random()<0.5){x=Math.random()<0.5?Math.floor(Math.random()*cols*0.1):Math.floor(cols*0.9+Math.random()*cols*0.1);y=Math.floor(rows*0.1+Math.random()*rows*0.8)}else{x=Math.floor(cols*0.1+Math.random()*cols*0.8);y=Math.random()<0.5?Math.floor(Math.random()*rows*0.1):Math.floor(rows*0.9+Math.random()*rows*0.1)} break;
          case 'corners': { const c=Math.floor(Math.random()*4),s=0.15; if(c===0){x=Math.floor(Math.random()*cols*s);y=Math.floor(Math.random()*rows*s)}else if(c===1){x=Math.floor(cols*(1-s)+Math.random()*cols*s);y=Math.floor(Math.random()*rows*s)}else if(c===2){x=Math.floor(Math.random()*cols*s);y=Math.floor(rows*(1-s)+Math.random()*rows*s)}else{x=Math.floor(cols*(1-s)+Math.random()*cols*s);y=Math.floor(rows*(1-s)+Math.random()*rows*s)} break; }
          case 'bottom-middle-left': x=Math.floor(cols*(0.1+Math.random()*0.4));y=Math.floor(rows*(0.65+Math.random()*0.3)); break;
          default: x=Math.floor(Math.random()*cols);y=Math.floor(Math.random()*rows);
        }
        att++;
      } while(isTooCloseToText(x,y)&&att<50);
      return {x,y};
    }
    class Ant {
      constructor(x,y,r=0){this.x=x;this.y=y;this.dir=Math.floor(Math.random()*4);this.ruleSet=r;this.color=[colors.accent1,colors.accent2,colors.accent3][r%3];this.age=0;this.trail=[];this.maxTrailLength=20;}
      step(){const c=grid[this.y][this.x];if(this.ruleSet===0){c.state=c.state^1;this.dir=(this.dir+(c.state===0?1:3))%4}else if(this.ruleSet===1){c.state=(c.state+1)%4;const t=[1,1,3,1];this.dir=(this.dir+t[c.state])%4}else{c.state=c.state^1;this.dir=(this.dir+(c.visits%2===0?1:2))%4}c.visits++;c.age=0;this.trail.push({x:this.x,y:this.y});if(this.trail.length>this.maxTrailLength)this.trail.shift();if(this.dir===0)this.y=(this.y-1+rows)%rows;else if(this.dir===1)this.x=(this.x+1)%cols;else if(this.dir===2)this.y=(this.y+1)%rows;else this.x=(this.x-1+cols)%cols;this.age++;}
      draw(){this.trail.forEach((p,i)=>{const a=(i/this.trail.length)*colors.trailOpacity;ctx.fillStyle=this.color+Math.floor(a*255).toString(16).padStart(2,'0');ctx.fillRect(p.x*cellSize,p.y*cellSize,cellSize,cellSize)});const g=ctx.createRadialGradient(this.x*cellSize+cellSize/2,this.y*cellSize+cellSize/2,0,this.x*cellSize+cellSize/2,this.y*cellSize+cellSize/2,cellSize*3);g.addColorStop(0,this.color);g.addColorStop(1,this.color+'00');ctx.fillStyle=g;ctx.fillRect(this.x*cellSize-cellSize*2,this.y*cellSize-cellSize*2,cellSize*5,cellSize*5);}
    }
    const ants=[];
    for(let i=0;i<15;i++){const p=generateSpawnPosition('center-scattered');ants.push(new Ant(p.x,p.y,0))}
    for(let i=0;i<10;i++){const p=generateSpawnPosition('mid-zones');ants.push(new Ant(p.x,p.y,0))}
    for(let i=0;i<12;i++){const p=generateSpawnPosition('random-all');ants.push(new Ant(p.x,p.y,1))}
    for(let i=0;i<5;i++){const p=generateSpawnPosition('edges');ants.push(new Ant(p.x,p.y,2))}
    for(let i=0;i<3;i++){const p=generateSpawnPosition('corners');ants.push(new Ant(p.x,p.y,2))}
    for(let i=0;i<8;i++){const p=generateSpawnPosition('bottom-middle-left');ants.push(new Ant(p.x,p.y,0))}
    for(let i=0;i<6;i++){const p=generateSpawnPosition('bottom-middle-left');ants.push(new Ant(p.x,p.y,1))}
    for(let i=0;i<4;i++){const p=generateSpawnPosition('bottom-middle-left');ants.push(new Ant(p.x,p.y,2))}
    updateColors();
    let frame=0;
    function animate(){
      ctx.fillStyle=colors.white+'08';ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let y=0;y<rows;y++){for(let x=0;x<cols;x++){const c=grid[y][x];c.age++;if(c.state!==0){const intensity=Math.min(1,c.visits/10),fade=Math.max(0,1-c.age/1000);if(c.visits>5){const ci=c.visits%3,ac=[colors.accent1,colors.accent2,colors.accent3][ci];ctx.fillStyle=ac+Math.floor(fade*intensity*255).toString(16).padStart(2,'0')}else{ctx.fillStyle=colors.black+Math.floor(fade*255).toString(16).padStart(2,'0')}ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize)}}}
      const spf=Math.floor(8+Math.sin(frame*0.01)*3);for(let i=0;i<spf;i++){ants.forEach(a=>a.step())}ants.forEach(a=>a.draw());
      frame++;requestAnimationFrame(animate);
    }
    window.addEventListener('resize',()=>{resizeCanvas();cols=Math.floor(canvas.width/cellSize);rows=Math.floor(canvas.height/cellSize);const ng=Array.from({length:rows},()=>Array.from({length:cols},()=>({state:0,age:0,visits:0})));for(let y=0;y<Math.min(rows,grid.length);y++){for(let x=0;x<Math.min(cols,grid[0].length);x++){ng[y][x]=grid[y][x]}}grid=ng;trailCanvas.width=canvas.width;trailCanvas.height=canvas.height;});
    animate();
  </script>
</body>
</html>
