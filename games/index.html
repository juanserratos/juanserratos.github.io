<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games - Juan Serratos</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="alternate icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="../style.css">

  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      tex2jax: {
        inlineMath: [['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.95em;
    }
    .back-link:hover { text-decoration: underline; }

    .post-container {
      width: 100%;
      max-width: none;
    }

    .post-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .post-header h2 { margin-top: 0; color: var(--accent); }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9em;
      margin-top: 8px;
    }

    .post-content {
      font-size: 1.05em;
      line-height: 1.8;
      max-width: 820px;
      margin: 0 auto;
    }
    .post-content p,
    .post-content ul,
    .post-content ol {
      max-width: none;
    }
    .post-content h1, .post-content h2, .post-content h3 { margin-top: 28px; }
    .post-content blockquote {
      border-left: 3px solid var(--border-color);
      padding-left: 16px;
      margin: 20px 0;
      color: var(--muted);
      font-style: italic;
    }
    .post-content pre {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 16px;
      overflow-x: auto;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .post-content code {
      background: var(--card-bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .post-content pre code { background: none; padding: 0; }
    .post-content img {
      display: block;
      width: 100%;
      max-width: 760px;
      height: auto;
      margin: 22px auto;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      .post-content,
      .post-container {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-layout">
    <div class="content-panel">

      <div id="postList">
        <h1>Games</h1>
        <div class="games-layout">
          <div class="games-posts" id="postsGrid"></div>
          <div class="games-canvas-wrap">
            <canvas id="gameCanvas"></canvas>
            <div class="games-score" id="gameScore"></div>
          </div>
        </div>
      </div>

      <div id="postView" style="display: none;">
        <span class="back-link" id="backLink">&larr; Back to all games</span>
        <div class="post-container">
          <div class="post-header">
            <h2 id="postTitle"></h2>
            <div class="post-meta">
              <span id="postDate"></span>
              <span>&middot;</span>
              <span id="readTime"></span>
            </div>
          </div>
          <div class="post-content" id="postContent"></div>
        </div>
      </div>

    </div>

    <aside class="sidebar">
      <div class="sidebar-lang">
        <a href="../index.html" class="active">EN</a> |
        <a href="../fr/index.html">FR</a> |
        <a href="../es/index.html">ES</a>
      </div>
      <div class="sidebar-header"><a href="../index.html">Juan Serratos</a></div>
      <nav>
        <ul>
          <li><a href="../cv.html">CV</a></li>
          <li><a href="../publications.html">Publications</a></li>
          <li><a href="../books.html">Books</a></li>
          <li><a href="../courses.html">Courses</a></li>
          <li><a href="../activities.html">Activities</a></li>
          <li><a href="../blog/index.html">Writing</a></li>
          <li><a href="index.html" class="current">Games</a></li>
          <li><a href="../projects/projects/portfolio-optimization.html">Projects</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <p>serratos@upenn.edu</p>
      </div>
    </aside>
  </div>

  <script>
    const posts = [
      {
        file: 'Nim',
        title: "Nim",
        date: '2026-03-04',
        tags: ['combinatorics', 'game-theory'],
        readTime: '10 min read'
      }
    ];

    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    const postList = document.getElementById('postList');
    const postView = document.getElementById('postView');
    const postsGrid = document.getElementById('postsGrid');
    const backLink = document.getElementById('backLink');
    const canvasWrap = document.querySelector('.games-canvas-wrap');

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
    }

    function renderPosts() {
      postsGrid.innerHTML = '';
      posts.forEach((post, i) => {
        const entry = document.createElement('div');
        entry.className = 'pub-entry';
        entry.style.cursor = 'pointer';
        entry.innerHTML = `
          <span class="pub-title">${post.title}</span><br>
          <span class="pub-venue">${formatDate(post.date)} &middot; ${post.readTime}</span>
        `;
        entry.addEventListener('click', () => loadPost(post));
        postsGrid.appendChild(entry);
      });
    }

    function loadPost(post) {
      postList.style.display = 'none';
      postView.style.display = 'block';
      document.getElementById('postTitle').textContent = post.title;
      document.getElementById('postDate').textContent = formatDate(post.date);
      document.getElementById('readTime').textContent = post.readTime;
      history.pushState({ post: post.file }, post.title, `?post=${post.file}`);
      fetch(`posts/${post.file}.md`)
        .then(r => r.text())
        .then(text => {
          const protectedText = text
            .replace(/\\\(/g, 'MATH_DELIM_LPAREN')
            .replace(/\\\)/g, 'MATH_DELIM_RPAREN')
            .replace(/\\\[/g, 'MATH_DELIM_LBRACK')
            .replace(/\\\]/g, 'MATH_DELIM_RBRACK');

          const parsedHtml = marked.parse(protectedText)
            .replace(/MATH_DELIM_LPAREN/g, '\\(')
            .replace(/MATH_DELIM_RPAREN/g, '\\)')
            .replace(/MATH_DELIM_LBRACK/g, '\\[')
            .replace(/MATH_DELIM_RBRACK/g, '\\]');

          document.getElementById('postContent').innerHTML = parsedHtml;
          if (window.MathJax && MathJax.Hub) {
            MathJax.Hub.Queue(["Typeset", MathJax.Hub, 'postContent']);
          }
          window.scrollTo(0, 0);
        })
        .catch(() => {
          document.getElementById('postContent').innerHTML = '<p>Post content not found.</p>';
        });
    }

    function showList() {
      postList.style.display = 'block';
      postView.style.display = 'none';
      renderPosts();
      history.pushState(null, '', 'index.html');
    }

    backLink.addEventListener('click', showList);

    const params = new URLSearchParams(window.location.search);
    const postParam = params.get('post');
    if (postParam) {
      const post = posts.find(p => p.file === postParam);
      if (post) loadPost(post);
      else renderPosts();
    } else {
      renderPosts();
    }

    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.post) {
        const post = posts.find(p => p.file === event.state.post);
        if (post) loadPost(post);
      } else {
        showList();
        renderPosts();
      }
    });
  </script>
  <script src="cardnim.js"></script>
</body>
</html>
